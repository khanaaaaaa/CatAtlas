<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatAtlas</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>CatAtlas</h1>
            <p>The World's Most Overprepared Travelling Cat</p>
        </header>

        <section class="card profile-card">
            <h2>Your Cat ₍^. .^₎⟆</h2>

            <img
                id="catImage"
                src="https://cdn2.thecatapi.com/images/MTY3ODIyMQ.jpg"
                alt="Cat">

            <div class="profile-info">
                <p><strong>Name:</strong> Mochi</p>
                <p><strong>Personality:</strong> Chaotic</p>
                <p><strong>Favorite Food:</strong> Salmon</p>
                <p><strong>Dream Destination:</strong> Japan</p>
                <p><strong>Brain Cells:</strong> 1</p>
            </div>

            <button id="newCatBtn">✦ Generate New Cat ✦</button>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
