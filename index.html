<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatAtlas</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

            <div class="cat-picker">
                <div class="screen-select" class="screen active">
                    <h1 class="screen-inner">
                        <h1 class="logo">CAT ATLAS</h1>
                        <p class="subtitle">Choose your travel companion</p>
                    </h1>
                    </div>
                    <div class="cat-option" data-cat="mochi" data-img="mochi.png">
                        <div class="cat-avatar">
                            <img src="mochi.png" alt="Mochi">
                        </div>
                        <p class="cat-name">MOCHI</p>
                        <p class="cat-desc">Adventurous · Loves Tuna</p>
                    </div>
                    <div class="cat-option" data-cat="soba" data-img="soba.png">
                        <div class="cat-avatar">
                            <img src="soba.png" alt="Soba">
                        </div>
                        <p class="cat-name">SOBA</p>
                        <p class="cat-desc">Curious · Loves Salmon</p>
                    </div>
                    <div class="cat-option" data-cat="yuzu" data-img="yuzu.png">
                        <div class="cat-avatar">
                            <img src="yuzu.png" alt="Yuzu">
                        </div>
                        <p class="cat-name">YUZU</p>
                        <p class="cat-desc">Brave · Loves Chicken</p>
                    </div>
                </div>

                        <button id="selectCatBtn" disabled>▶ BEGIN JOURNEY</button>
            </div>
        </div>

        <div id="screen-intro" class="screen">
            <div class="screen-inner">
                <div class="narrator-box">
                    <div class="narratort-avatar" id="narratorAvatar">₍^. .^₎⟆</div>
                    <div class="speech-bubble" id="speechBubble">
                        <p id="narratorText"></p>
                        <span class="cursor"></span>
                    </div>
                </div>
                <button id="nextLineBtn">▶ NEXT</button>
            </div>
        </div>
