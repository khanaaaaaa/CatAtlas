<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatAtlas</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Sawarabi+Mincho&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="screen-loading" class="screen active">
        <div class="loading-inner">
            <div class="paw-trail">
                <span class="paw" style="--d:0s">*</span>
                <span class="paw" style="--d:0.2s">*</span>
                <span class="paw" style="--d:0.4s">*</span>
                <span class="paw" style="--d:0.6s">*</span>
                <span class="paw" style="--d:0.8s">*</span>
            </div>
            <h1 class="logo">CAT ATLAS</h1>
            <div class="loading-bar-wrap">
                <div class="loading-bar" id="loadingBar"></div>
                <div class="loading-cat" id="loadingCat">^.^</div>
            </div>
            <p class="loading-text" id="loadingText">LOADING...</p>
        </div>
    </div>

    <div id="screen-select" class="screen">
        <div class="select-inner">
            <h1 class="logo">CAT ATLAS</h1>
            <p class="tagline">choose your travel companion</p>
            <div class="cat-picker">
                <div class="cat-option" data-cat="mochi" data-type="Adventurous" data-food="Tuna" data-img="mochi.png">
                    <div class="cat-avatar">
                        <img src="mochi.png" alt="Mochi">
                    </div>
                    <p class="cat-name">MOCHI</p>
                    <p class="cat-desc">Adventurous</p>
                    <p class="cat-desc">Loves Tuna</p>
                </div>
                <div class="cat-option" data-cat="soba" data-type="Curious" data-food="Salmon" data-img="soba.png">
                    <div class="cat-avatar">
                        <img src="soba.png" alt="Soba">
                    </div>
                    <p class="cat-name">SOBA</p>
                    <p class="cat-desc">Curious</p>
                    <p class="cat-desc">Loves Salmon</p>
                </div>
                <div class="cat-option" data-cat="yuzu" data-type="Brave" data-food="Chicken" data-img="yuzu.png">
                    <div class="cat-avatar">
                        <img src="yuzu.png" alt="Yuzu">
                    </div>
                    <p class="cat-name">YUZU</p>
                    <p class="cat-desc">Brave</p>
                    <p class="cat-desc">Loves Chicken</p>
                </div>
            </div>
            <div id="selectedPreview" class="selected-preview hidden">
                <p id="previewText"></p>
            </div>
            <button id="selectCatBtn" disabled>BEGIN JOURNEY</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
