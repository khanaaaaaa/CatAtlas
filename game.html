<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatAtlas</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Sawarabi+Mincho&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <div id="cat-bar">
        <div id="bar-left">
            <img id="bar-img" src="" alt="cat">
            <div id="bar-info">
                <span id="bar-name"></span>
                <span id="bar-rep">Local Tourist</span>
            </div>
        </div>
        <div id="bar-stats">
            <div class="mini-stat">
                <span>KNW</span>
                <div class="mini-bar"><div class="mini-fill" id="bar-knowledge" style="width:0%"></div>
            </div>
            <div class="mini-stat">
                <span>TRIPS</span>
                <div class="mini-bar"><div class="mini-fill" id="ar-trips" style="width:0%"></div></div>
            </div>
        </div>
    </div>

    <div id="tip-box" class="hidden">
        <img id="tip-img" src="" alt="cat">
        <p id="tip-text"></p>
        <button id="tip-btn">OK</button>
    </div>

    <div id="game-content">

        <section class="card" id="section-profile">
            <div class="card-title">YOUR CAT</div>
            <div id="profile-top">
                <div class="img-frame">
                    <img id="cat-img" src="" alt="cat">
                    <label for="cat-upload">CHANGE</label>
                    <input type="file" id="cat-upload" accept="image/*">
                </div>
                <div id="profile-fields">
                    <p><span>NAME</span><span id="p-name"></span></p>
                    <p><span>TYPE</span><span id="p-type"></span></p>
                    <p><span>FOOD</span><span id="p-food"></span></p>
                    <p><span>TRIPS</span><span id="p-trips">0</span></p>
                </div>
            </div>
            <div id="stats">
                <div class="stat-row"><span>ENERGY</span><div class="bar"><div class="fill" style="width:85%"></div></div><small>85</small></div>
                <div class="stat-row"><span>CURIOSITY</span><div class="bar"><div class="fill" style="width:92%"></div></div><small>92</small></div>
                <div class="stat-row"><span>COURAGE</span><div class="bar"><div class="fill" style="width:70%"></div></div><small>70</small></div>
                <div class="stat-row"><span>KNOWLEDGE</span><div class="bar"><div class="fill" id="knowledge-fill" style="width:0%"></div></div><small id="knowledge-val">0</small></div>
            </div>
            <div id="goals">
                <div class="card-title" style="margin-top:16px">DREAM GOALS</div>
                <p id="goal-1">[ ] See the Northern Lights</p>
                <p id="goal-1">[ ] Climb a mountain</p>
                <p id="goal-3">[ ] Ride a train</p>
            </div>
            <div id="reputation">
                <div class="card-title" style="margin-top:16px">REPUTATION</div>
                <p id="rep-title">Local Tourist</p>
            </div>
        </section>
    </div>
</body>
</html>
